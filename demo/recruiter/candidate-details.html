<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Candidate Details – Demo | Skreenit</title>

    <script>
    (function() {
      const isLocal = ['localhost', '127.0.0.1',''].includes(window.location.hostname);
      const assetsBase = isLocal ? '../../assets' : 'https://assets.skreenit.com';
      const im = document.createElement('script');
      im.type = 'importmap';
      im.textContent = JSON.stringify({ imports: { "@shared/": `${assetsBase}/assets/` } });
      document.head.appendChild(im);
      
      window.loadSharedCSS = function(file) {
        const link = document.createElement('link'); 
        link.rel = 'stylesheet'; 
        link.href = `${assetsBase}/assets/css/${file}?v=` + new Date().getTime(); 
        document.head.appendChild(link);
      };
      
      const icon = document.createElement('link'); 
      icon.rel = 'icon'; 
      icon.href = `${assetsBase}/assets/images/favicon-32x32.png`; 
      document.head.appendChild(icon);
    })();
    </script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />

    <script>
      loadSharedCSS('core.css');   
      loadSharedCSS('layout.css'); 
      loadSharedCSS('components.css');
      loadSharedCSS('mobile.css');
    </script>

    <style>
        .demo-banner {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 0.75rem 1rem;
            text-align: center;
            font-size: 0.9rem;
            position: sticky;
            top: 0;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }
        
        .demo-banner i { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .exit-demo-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 0.35rem 0.75rem;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            text-decoration: none;
        }
        
        .exit-demo-btn:hover { background: rgba(255,255,255,0.3); color: white; }
        
        .candidate-detail-container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: #64748b;
            text-decoration: none;
            margin-bottom: 1rem;
            font-weight: 500;
        }
        
        .back-btn:hover { color: #6366f1; }
        
        .candidate-header {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            display: flex;
            gap: 2rem;
            align-items: flex-start;
        }
        
        .candidate-avatar-large {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2.5rem;
            flex-shrink: 0;
        }
        
        .candidate-header-info {
            flex: 1;
        }
        
        .candidate-header-name {
            font-size: 1.75rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 0.25rem;
        }
        
        .candidate-header-title {
            font-size: 1.1rem;
            color: #64748b;
            margin-bottom: 1rem;
        }
        
        .candidate-header-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            color: #475569;
            font-size: 0.95rem;
        }
        
        .meta-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .meta-item i { color: #6366f1; }
        
        .match-score-large {
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            border: 2px solid #22c55e;
            border-radius: 12px;
            padding: 1rem 1.5rem;
            text-align: center;
        }
        
        .match-score-label {
            font-size: 0.85rem;
            color: #166534;
            margin-bottom: 0.25rem;
        }
        
        .match-score-value {
            font-size: 2rem;
            font-weight: 700;
            color: #15803d;
        }
        
        .detail-section {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        .detail-section h3 {
            font-size: 1.25rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .detail-section h3 i { color: #6366f1; }
        
        .skills-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        
        .skill-tag {
            background: #e0e7ff;
            color: #4f46e5;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 500;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }
        
        .info-item {
            padding: 1rem;
            background: #f8fafc;
            border-radius: 8px;
        }
        
        .info-label {
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 0.25rem;
        }
        
        .info-value {
            font-size: 1rem;
            color: #1e293b;
            font-weight: 500;
        }
        
        .video-interview-section {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        .video-card {
            background: #f8fafc;
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        
        .video-question {
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
        }
        
        .video-question i {
            color: #6366f1;
            margin-top: 0.25rem;
        }
        
        .video-placeholder {
            background: #1e293b;
            border-radius: 8px;
            aspect-ratio: 16/9;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .video-placeholder:hover {
            background: #334155;
        }
        
        .video-placeholder i {
            font-size: 3rem;
        }
        
        .analysis-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            padding: 2rem;
            color: white;
            margin-bottom: 1.5rem;
        }
        
        .analysis-section h3 {
            color: white;
            margin-bottom: 1.5rem;
        }
        
        .analysis-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
        }
        
        .analysis-item {
            background: rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
        }
        
        .analysis-score {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }
        
        .analysis-label {
            font-size: 0.85rem;
            opacity: 0.9;
        }
        
        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        
        .action-btn-large {
            flex: 1;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .action-btn-primary {
            background: #22c55e;
            color: white;
        }
        
        .action-btn-primary:hover {
            background: #16a34a;
        }
        
        .action-btn-secondary {
            background: white;
            color: #6366f1;
            border: 2px solid #6366f1;
        }
        
        .action-btn-secondary:hover {
            background: #f5f3ff;
        }
        
        .action-btn-danger {
            background: white;
            color: #ef4444;
            border: 2px solid #ef4444;
        }
        
        .action-btn-danger:hover {
            background: #fef2f2;
        }
        
        @media (max-width: 768px) {
            .candidate-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            
            .candidate-header-meta {
                justify-content: center;
            }
            
            .action-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- Demo Banner -->
    <div class="demo-banner">
        <i class="fas fa-play-circle"></i>
        <span>You're viewing a <strong>Demo</strong> with sample data</span>
        <a href="../index.html" class="exit-demo-btn">
            <i class="fas fa-sign-out-alt"></i> Exit Demo
        </a>
    </div>

    <div class="candidate-detail-container">
        <a href="applications.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> Back to Applications
        </a>
        
        <div id="candidateContent">
            <div class="loading-spinner"></div>
        </div>
    </div>

    <!-- Demo Action Modal -->
    <div class="modal fade" id="demoActionModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;">
                    <h5 class="modal-title"><i class="fas fa-play-circle me-2"></i>Demo Mode</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center py-4">
                    <i class="fas fa-check-circle" style="font-size: 3rem; color: #22c55e;"></i>
                    <h5 class="mt-3" id="modalTitle">Action Completed</h5>
                    <p class="text-muted" id="modalMessage">In demo mode, this action is simulated.</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Got it!</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { 
            DEMO_APPLICATIONS,
            DEMO_CANDIDATES,
            DemoSession,
            mockDelay 
        } from '../js/demo-data.js';
        
        const urlParams = new URLSearchParams(window.location.search);
        const appId = urlParams.get('app_id');
        
        // Find application and candidate
        const application = DEMO_APPLICATIONS.find(a => a.id === appId);
        const candidate = application ? DEMO_CANDIDATES.find(c => c.id === application.candidate_id) : null;
        
        async function initPage() {
            await mockDelay(300);
            
            const container = document.getElementById('candidateContent');
            
            if (!application || !candidate) {
                container.innerHTML = `
                    <div class="detail-section text-center py-5">
                        <i class="fas fa-exclamation-circle" style="font-size: 3rem; color: #ef4444;"></i>
                        <h3 class="mt-3">Candidate Not Found</h3>
                        <p class="text-muted">This candidate doesn't exist in demo data.</p>
                        <a href="applications.html" class="btn btn-primary mt-3">Back to Applications</a>
                    </div>
                `;
                return;
            }
            
            const formatSalary = (num) => {
                if (num >= 100000) return `${(num / 100000).toFixed(1)} LPA`;
                return `₹${num.toLocaleString()}`;
            };
            
            container.innerHTML = `
                <!-- Header -->
                <div class="candidate-header">
                    <div class="candidate-avatar-large">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="candidate-header-info">
                        <h1 class="candidate-header-name">${candidate.name}</h1>
                        <p class="candidate-header-title">${candidate.current_role} at ${candidate.current_company}</p>
                        <div class="candidate-header-meta">
                            <div class="meta-item">
                                <i class="fas fa-map-marker-alt"></i>
                                <span>${candidate.location}</span>
                            </div>
                            <div class="meta-item">
                                <i class="fas fa-briefcase"></i>
                                <span>${candidate.experience_years} years experience</span>
                            </div>
                            <div class="meta-item">
                                <i class="fas fa-graduation-cap"></i>
                                <span>${candidate.education.split(',')[0]}</span>
                            </div>
                        </div>
                    </div>
                    <div class="match-score-large">
                        <div class="match-score-label">Match Score</div>
                        <div class="match-score-value">${application.match_score}%</div>
                    </div>
                </div>
                
                <!-- Skills -->
                <div class="detail-section">
                    <h3><i class="fas fa-code"></i> Skills</h3>
                    <div class="skills-grid">
                        ${candidate.skills.map(skill => `<span class="skill-tag">${skill}</span>`).join('')}
                    </div>
                </div>
                
                <!-- Profile Summary -->
                <div class="detail-section">
                    <h3><i class="fas fa-user"></i> Profile Summary</h3>
                    <p style="color: #475569; line-height: 1.7;">${candidate.profile_summary}</p>
                </div>
                
                <!-- Details -->
                <div class="detail-section">
                    <h3><i class="fas fa-info-circle"></i> Details</h3>
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="info-label">Email</div>
                            <div class="info-value">${candidate.email}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Phone</div>
                            <div class="info-value">${candidate.phone}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Expected Salary</div>
                            <div class="info-value">${formatSalary(candidate.expected_salary)}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Notice Period</div>
                            <div class="info-value">${candidate.notice_period}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Profile Completion</div>
                            <div class="info-value">${candidate.profile_completion}%</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Applied For</div>
                            <div class="info-value">${application.job_title}</div>
                        </div>
                    </div>
                </div>
                
                ${application.interview_questions && application.interview_questions.length > 0 ? `
                    <!-- Video Interview -->
                    <div class="video-interview-section">
                        <h3><i class="fas fa-video"></i> Video Interview Responses</h3>
                        ${application.interview_questions.map((q, i) => `
                            <div class="video-card">
                                <div class="video-question">
                                    <i class="fas fa-question-circle"></i>
                                    <span>Q${i + 1}: ${q.question}</span>
                                </div>
                                <div class="video-placeholder" onclick="playDemoVideo()">
                                    <i class="fas fa-play-circle"></i>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    
                    ${application.analysis ? `
                        <!-- AI Analysis -->
                        <div class="analysis-section">
                            <h3><i class="fas fa-brain"></i> AI Analysis Report</h3>
                            <div class="analysis-grid">
                                <div class="analysis-item">
                                    <div class="analysis-score">${application.analysis.overall_score}%</div>
                                    <div class="analysis-label">Overall Score</div>
                                </div>
                                <div class="analysis-item">
                                    <div class="analysis-score">${application.analysis.communication}%</div>
                                    <div class="analysis-label">Communication</div>
                                </div>
                                <div class="analysis-item">
                                    <div class="analysis-score">${application.analysis.technical_knowledge}%</div>
                                    <div class="analysis-label">Technical</div>
                                </div>
                                <div class="analysis-item">
                                    <div class="analysis-score">${application.analysis.confidence}%</div>
                                    <div class="analysis-label">Confidence</div>
                                </div>
                            </div>
                        </div>
                    ` : ''}
                ` : ''}
                
                <!-- Action Buttons -->
                <div class="action-buttons">
                    <button class="action-btn-large action-btn-primary" onclick="showDemoAction('Shortlisted!', 'Candidate has been added to your shortlist.')">
                        <i class="fas fa-check"></i> Shortlist
                    </button>
                    <button class="action-btn-large action-btn-secondary" onclick="showDemoAction('Interview Scheduled', 'An interview invitation has been sent to the candidate.')">
                        <i class="fas fa-calendar"></i> Schedule Interview
                    </button>
                    <button class="action-btn-large action-btn-danger" onclick="showDemoAction('Application Rejected', 'A rejection email has been sent to the candidate.')">
                        <i class="fas fa-times"></i> Reject
                    </button>
                </div>
            `;
        }
        
        // Initialize
        initPage();
        
        // Global functions
        window.playDemoVideo = function() {
            showDemoAction('Video Player', 'In demo mode, video playback is simulated. In the real application, you can watch the full interview recording.');
        };
        
        window.showDemoAction = function(title, message) {
            document.getElementById('modalTitle').textContent = title || 'Action Completed';
            document.getElementById('modalMessage').textContent = message || 'In demo mode, this action is simulated.';
            const modal = new bootstrap.Modal(document.getElementById('demoActionModal'));
            modal.show();
        };
    </script>
</body>
</html>
